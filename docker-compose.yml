services:
  # PostgreSQL Database with pgvector extension
  db:
    image: pgvector/pgvector:pg15@sha256:7f5681e45237acdf546cf7cdc0dfc0ed7752ede857fda6e54f6ea21b936f8742
    container_name: vstx-saas-db
    environment:
      POSTGRES_DB: ${DB_NAME:-analytics_db}
      POSTGRES_USER: ${DB_USER:-analytics_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-analytics_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-analytics_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee
    container_name: vstx-saas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_redis_password_change_me}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_password_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vstx-saas-backend
    # Gunicorn gthread gives ~2-3x I/O-bound concurrency over 4 sync workers at
    # identical memory. Zero code risk since views are thread-safe (no module-
    # level mutable state beyond what Django itself guards).
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --worker-class gthread --timeout 120
    volumes:
      # Dev-only source bind mount lives in docker-compose.override.yml so it's
      # auto-loaded by `docker compose up` but not by explicit -f prod commands
      # -- otherwise the image-pinning pattern (prod.yml sets image:) would be
      # silently defeated by the bind mount overriding /app.
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/0
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vstx-saas-celery
    command: celery -A config worker -l info
    # Dev source bind mount is in docker-compose.override.yml (see backend).
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Flower Monitoring (TD-013)
  flower:
    image: mher/flower:2.0@sha256:51c3c3db5be343e6335e3dbca5348708932bbcca992df6a39f1dad91e3b340df
    container_name: vstx-saas-flower
    command: celery --broker=redis://:${REDIS_PASSWORD:-dev_redis_password_change_me}@redis:6379/0 flower --port=5555
    environment:
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower_admin_change_me}
      - FLOWER_PURGE_OFFLINE_WORKERS=60
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
        - VITE_APP_TITLE=${VITE_APP_TITLE:-Analytics Dashboard}
        - VITE_APP_LOGO=${VITE_APP_LOGO:-/vtx_logo2.png}
    container_name: vstx-saas-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    container_name: vstx-saas-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
  static_volume:
  media_volume:
