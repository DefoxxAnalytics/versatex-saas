# Production Nginx Configuration for Versatex Analytics Frontend
# Includes CSP, security headers, gzip, and SPA routing

# Forward-scheme pass-through for Cloudflare Tunnel deployments.
# Cloudflare edge sets X-Forwarded-Proto: https; the cloudflared->nginx hop
# is plaintext HTTP, so $scheme alone would be "http" and Django would
# bounce-redirect any SECURE_SSL_REDIRECT=True request into an infinite loop.
# This map prefers the incoming X-Forwarded-Proto when present, falls back to
# $scheme for direct (no-proxy) requests.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $scheme;
    ~.+     $http_x_forwarded_proto;
}

server {
    # Unprivileged port — container runs nginx as the 'nginx' user, which
    # cannot bind to ports < 1024 without CAP_NET_BIND_SERVICE. docker-compose
    # maps host FRONTEND_PORT to container 8080.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    # HSTS — pin browsers to HTTPS for 1 year (Finding #15).
    # Defends auth cookies against SSL strip on first connect or after browser
    # cache expiry. The cloudflared->nginx hop is plaintext HTTP, but the
    # browser-facing leg is HTTPS via Cloudflare edge, so emitting HSTS here
    # is correct.
    #
    # NOTE: 'preload' is deliberately omitted. Submitting to the HSTS preload
    # list (https://hstspreload.org/) is irreversible for the full max-age (1
    # year) — every browser will hardcode the domain. Add 'preload' ONLY after:
    #   1. ≥1 week of production validation with the current header in place
    #   2. All subdomains confirmed serving HTTPS (or excluded)
    #   3. Then: append "; preload", redeploy, submit at hstspreload.org
    # Django emits the same header via SECURE_HSTS_* in config/settings.py
    # (gated on DEBUG=False). Both layers carry it so direct-to-Django requests
    # are also protected.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy — production tight, same-origin only.
    # All API traffic goes through the /api/ proxy below (same origin as the
    # SPA), so connect-src 'self' covers everything. Pre-refactor the policy
    # whitelisted http://localhost:8001 + https://*.railway.app for legacy
    # cross-origin dev + Railway deploys; both are removed now that single-
    # origin is canonical.
    #
    # Finding #14 — CSP hardening (Phase 5 task 5.2, partial):
    #
    # script-src 'unsafe-eval' — REMOVED. Verified safe via two checks:
    #   1. Bundle scan: zero `eval(` and zero `new Function(` calls across all
    #      404 emitted .js files (incl. vendor-charts-*.js for ECharts 6.x).
    #      ECharts 6 does not depend on `'unsafe-eval'` for the chart subset
    #      this app uses; the original concern about eval-like expression
    #      evaluation applied to older versions or unused features.
    #   2. Smoke test: login + dashboard + suppliers + categories + pareto +
    #      p2p/cycle pages render with zero CSP violations and zero console
    #      errors after removal.
    #
    # script-src 'unsafe-inline' — KEPT. The Vite build emits an inline
    # `<script id="manus-runtime">` (~365 KB) into dist/index.html via the
    # `vite-plugin-manus-runtime` plugin loaded in frontend/vite.config.ts:7,19
    # for non-test builds. This is Manus IDE preview tooling that ships
    # `window.__MANUS_HOST_DEV__ = false` plus a runtime helper bundle, and
    # has no production purpose. Three paths to drop 'unsafe-inline' (deferred
    # to a focused follow-up — out of scope for the CSP-only task):
    #   a) Best — gate `vitePluginManusRuntime()` on `command === 'serve'` in
    #      vite.config.ts so the inline script is never emitted in prod
    #      builds. Then 'unsafe-inline' can be dropped cleanly.
    #   b) Hash — add `'sha256-<base64>'` of the emitted script to script-src
    #      and a CI script-snapshot test. Brittle: hash drifts on any plugin
    #      update or build-context shift, silently rejected by the browser.
    #   c) Nonce — nginx `sub_filter` to inject a per-request nonce into the
    #      inline script tag. Multi-day work; not justified given option (a).
    #
    # style-src 'unsafe-inline' — KEPT. Required by Tailwind CSS 4 + shadcn/ui
    # `style={{...}}` attribute usage and Radix primitives that emit inline
    # styles for positioning/z-index. Drop would require migrating to nonced
    # style elements throughout the component library. Tracked separately.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/wasm;

    # INTERIM CONTAINMENT for register endpoint (Finding #1).
    # Remove after Phase 1 task 1.1 lands (RegisterSerializer no longer accepts caller-controlled role).
    location = /api/v1/auth/register/ {
        return 403;
    }
    location = /api/auth/register/ {
        return 403;
    }

    # Backend API — proxied same-origin so one URL (incl. a Cloudflare Tunnel)
    # serves both the SPA and Django. Uses ^~ to beat the static-asset regex below.
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Aligned with backend DATA_UPLOAD_MAX_MEMORY_SIZE (50 MB).
        client_max_body_size 50m;
        # SSE streaming (AI chat) needs buffering off
        proxy_buffering off;
        proxy_cache off;
    }

    # Django admin (respects ADMIN_URL in .env)
    location ^~ /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        # Aligned with backend DATA_UPLOAD_MAX_MEMORY_SIZE (50 MB).
        client_max_body_size 50m;
    }

    # Django static (admin assets via whitenoise) and media uploads
    location ^~ /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location ^~ /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # SPA Routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for container orchestration
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Cache static assets aggressively (hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
