# Production Nginx Configuration for Versatex Analytics Frontend
# Includes CSP, security headers, gzip, and SPA routing

# Forward-scheme pass-through for Cloudflare Tunnel deployments.
# Cloudflare edge sets X-Forwarded-Proto: https; the cloudflared->nginx hop
# is plaintext HTTP, so $scheme alone would be "http" and Django would
# bounce-redirect any SECURE_SSL_REDIRECT=True request into an infinite loop.
# This map prefers the incoming X-Forwarded-Proto when present, falls back to
# $scheme for direct (no-proxy) requests.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $scheme;
    ~.+     $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    # Content Security Policy — production tight, same-origin only.
    # All API traffic goes through the /api/ proxy below (same origin as the
    # SPA), so connect-src 'self' covers everything. Pre-refactor the policy
    # whitelisted http://localhost:8001 + https://*.railway.app for legacy
    # cross-origin dev + Railway deploys; both are removed now that single-
    # origin is canonical.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/wasm;

    # Backend API — proxied same-origin so one URL (incl. a Cloudflare Tunnel)
    # serves both the SPA and Django. Uses ^~ to beat the static-asset regex below.
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 100m;
        # SSE streaming (AI chat) needs buffering off
        proxy_buffering off;
        proxy_cache off;
    }

    # Django admin (respects ADMIN_URL in .env)
    location ^~ /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        client_max_body_size 100m;
    }

    # Django static (admin assets via whitenoise) and media uploads
    location ^~ /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location ^~ /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # SPA Routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for container orchestration
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Cache static assets aggressively (hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
