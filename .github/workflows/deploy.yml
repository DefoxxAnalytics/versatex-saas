name: Deploy

# Despite the name, this workflow only builds and publishes Docker images
# to GHCR. Actual deployment is manual — see docs/RAILWAY-DEPLOY-WALKTHROUGH.md.
# The "Deploy" name is preserved because docs/deployment/DEPLOY-PLAYBOOK.md
# uses `gh run list --workflow=Deploy` to gate deploys on green builds, and
# docker-compose.prod.yml's APP_VERSION rollback path depends on the GHCR
# tags this workflow publishes.

on:
  # Branch deploys gated on CI green: workflow_run fires only after CI
  # completes, and the job-level `if` checks conclusion == success. Without
  # this gate, a commit that fails tests or Trivy scan still publishes a
  # GHCR image tagged with its SHA, deployable via APP_VERSION rollout.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  # Tag pushes (intentional version releases) bypass the CI workflow_run gate
  # because CI doesn't trigger on tags. These are deliberate, low-frequency,
  # and operator-driven; the v* prefix is the human checkpoint.
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}-backend
  FRONTEND_IMAGE: ${{ github.repository }}-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Branch path: only proceed if the source CI run was successful.
    # Tag path: github.event_name == 'push' bypasses the workflow_run check.
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.example.com/api' }}
