name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Check code formatting with Black
        # Currently informational: ~191 files would reformat. Large-bang
        # cleanup tracked separately (out of scope for v3 prod hardening).
        # Promote to a hard gate once cleanup ships and CI is green.
        run: black --check --diff .
        continue-on-error: true

      - name: Check import sorting with isort
        # Currently informational: ~119 files have import order drift. Same
        # tracking issue as Black above. Bundling the cleanup + the gate
        # promotion in one PR is cleaner than fighting per-file conflicts.
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        # pgvector/pgvector image includes the 'vector' extension required by
        # analytics.0004_add_semantic_cache and 0005_embeddeddocument migrations.
        # Must match the image used in docker-compose.yml for parity.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: 'test-secret-key-for-ci-only'
      DEBUG: 'True'
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enable pgvector extension
        # The pgvector/pgvector image has the extension installed, but it
        # must be enabled per-database. Dev does this via an init script
        # mounted at /docker-entrypoint-initdb.d (see backend/scripts/init-pgvector.sql);
        # CI cannot mount volumes on service containers, so enable it here.
        #
        # Enabling on template1 means every subsequently-created database
        # (including pytest-django's test_test_db) inherits the extension,
        # not just the migrate target.
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d template1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U test_user -d test_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        # Coverage threshold and omit rules live in backend/.coveragerc so
        # the dev and CI runs share one source of truth.
        run: |
          pytest --cov=apps --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Lockfile drift guard (S-#3)
        run: |
          if [ -f package-lock.json ]; then
            echo "::error::frontend/package-lock.json should not exist; project uses pnpm. Delete it."
            exit 1
          fi
          if [ -f yarn.lock ]; then
            echo "::error::frontend/yarn.lock should not exist; project uses pnpm. Delete it."
            exit 1
          fi
        shell: bash

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint check
        # Currently informational: ~23 source files have Prettier drift.
        # Bundling format cleanup with the gate flip is out of scope for the
        # v3.0 prod-hardening branch; tracked as a separate cleanup task.
        run: pnpm format --check
        continue-on-error: true

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: https://api.example.com/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: versatex-saas-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: versatex-saas-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        # Pinned to the v0.36.0 commit SHA. Floating @master is a supply-chain
        # risk; tag refs (@v0.36.0) are immutable in GitHub Actions but a
        # digest pin is even safer. Bump deliberately.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  production-validator:
    name: Production Settings Validator
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        # Match backend-test image so vector-extension migrations can run.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: validator_user
          # Must match DB_PASSWORD in the validator env block below.
          POSTGRES_PASSWORD: 'validator-db-password-NOT-REAL-DO-NOT-USE-12345'
          POSTGRES_DB: validator_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Long, unique-looking values so production-mode checks that flag
      # short, default, or "MUST_CHANGE"-substring secrets don't trip.
      # NOT real secrets; do not reuse anywhere.
      SECRET_KEY: 'long-real-looking-secret-for-validator-NOT-REAL-DO-NOT-USE-AS-TEMPLATE-12345'
      DEBUG: 'False'
      DB_NAME: validator_db
      DB_USER: validator_user
      DB_PASSWORD: 'validator-db-password-NOT-REAL-DO-NOT-USE-12345'
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_PASSWORD: 'validator-redis-password-NOT-REAL-DO-NOT-USE-67890'
      ALLOWED_HOSTS: 'app.example.com,api.example.com'
      CORS_ALLOWED_ORIGINS: 'https://app.example.com'
      CSRF_TRUSTED_ORIGINS: 'https://app.example.com,https://api.example.com'
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      # Set to a placeholder so the "TRUSTED_PROXIES empty in production"
      # warning doesn't pollute logs. Not a fail-level=ERROR check.
      TRUSTED_PROXIES: '127.0.0.1'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django deploy check
        # --fail-level=ERROR — warnings (e.g. SECURE_SSL_REDIRECT not set on
        # an HTTPS-less test runner) don't fail the build. Promote to
        # WARNING once production HTTPS posture is fully clean.
        run: python manage.py check --deploy --fail-level=ERROR
