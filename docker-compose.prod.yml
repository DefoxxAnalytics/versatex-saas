# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Phase 5a of deployment prep added (vs. pre-deploy state):
# - restart: unless-stopped on every service (VPS reboots no longer leave the
#   stack dead — important because the only alternative is manual `up -d`).
# - json-file log rotation via anchor, capping footprint at ~300 MB total.
# - Image pinning via ghcr.io/defoxxanalytics/versatex-saas-* tagged by
#   APP_VERSION for rollback-via-`docker compose pull && up -d`.
# - Backend healthcheck switched to /api/health/ (Phase 2b added the endpoint).
# - Celery beat embedded in worker with tmpfs-backed schedule file -- single-
#   VPS scale is fine; split to dedicated beat service when adding workers.
#
# Pre-existing (kept as-is):
# - No external ports for DB/Redis.
# - Redis password + maxmemory policy.
# - Read-only filesystem + no-new-privileges on frontend.
# - internal network for db/redis isolation.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # PostgreSQL Database - No external ports in production
  db:
    # Remove external port mapping - only accessible within Docker network
    ports: []
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Add connection limits
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c log_statement=ddl
      -c log_connections=on
      -c log_disconnections=on
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
      - default

  # Redis - No external ports, with authentication
  redis:
    # Remove external port mapping
    ports: []
    # Add Redis authentication
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
      - default

  # Backend - Production configuration
  backend:
    # GHCR-pinned image. APP_VERSION is the git SHA or semver tag that the
    # deploy.yml build-push workflow published. Rollback = `APP_VERSION=<prev>
    # docker compose pull && docker compose up -d` (~90 s typical).
    image: ghcr.io/defoxxanalytics/versatex-saas-backend:${APP_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    # Use the readiness endpoint (Phase 2b). It probes DB + cache, so a dead
    # Redis or Postgres takes the container unhealthy -- the previous
    # ADMIN_URL-based check required ADMIN_URL to be set at container start
    # and only confirmed the admin login page renders.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security options
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - default

  # Celery Worker (+ embedded beat for scheduled tasks)
  celery:
    image: ghcr.io/defoxxanalytics/versatex-saas-backend:${APP_VERSION:-latest}
    # -B enables beat in the same container. /var/run/celery-beat is a tmpfs
    # below, so the schedule file is writable by the celery user without
    # permission gymnastics. Single-VPS deploy: acceptable trade-off (beat
    # dies with the worker); split to a dedicated celery-beat service when
    # adding a second worker.
    command: celery -A config worker -B -l info --concurrency=2 -s /var/run/celery-beat/celerybeat-schedule
    restart: unless-stopped
    logging: *default-logging
    tmpfs:
      - /var/run/celery-beat
    environment:
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - default

  # Celery Flower (monitoring)
  flower:
    restart: unless-stopped
    logging: *default-logging

  # Frontend - Production configuration
  frontend:
    image: ghcr.io/defoxxanalytics/versatex-saas-frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    # Read-only filesystem
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    # Mount nginx config for easier updates without rebuilding
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  internal:
    driver: bridge
    internal: true  # No external connectivity
  default:
    driver: bridge
